version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: btp_manager_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-btp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-btp_password}
      POSTGRES_DB: ${POSTGRES_DB:-btp_dz_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: btp_manager_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@btpmanager.dz}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
